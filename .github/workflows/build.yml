name: Build Windows executable

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to attach exe to (e.g. v0.1.2)"
        required: false
        default: ""

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Build executable
        run: pyinstaller --noconfirm RawAccelProfileSwitcher.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RawAccelProfileSwitcher
          path: dist/RawAccelProfileSwitcher.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/RawAccelProfileSwitcher.exe
